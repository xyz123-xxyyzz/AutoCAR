<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCAR Eklenti</title>
  <style>
    :root {
      --bg-color: #000000;
      --card-bg: #1C1C1E;
      --text-main: #FFFFFF;
      --text-muted: #8E8E93;
      --accent: #0A84FF;
      --border: #38383A;
      --danger: #FF453A;
    }
    
    body {
      margin: 0;
      padding: 16px;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .title {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }
    
    .status {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--card-bg);
      padding: 4px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    
    .tab-list {
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    
    .tab-list::-webkit-scrollbar {
      width: 4px;
    }
    
    .tab-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    
    .tab-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--card-bg);
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }
    
    .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 12px;
      transition: background 0.2s;
    }
    
    .remove-btn:hover {
      background: var(--border);
      color: var(--danger);
    }
    
    .action-btn {
      width: 100%;
      background-color: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .action-btn:hover {
      opacity: 0.9;
    }
    
    .action-btn:disabled {
      background-color: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }
    
    .empty-state {
      text-align: center;
      padding: 24px 0;
      color: var(--text-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">AutoCAR</h1>
    <div class="status" id="status-counter">Bekleniyor... 0/10</div>
  </div>
  
  <div class="tab-list" id="tab-list">
    <!-- Tabs will be inserted here -->
  </div>
  
  <button id="analyze-btn" class="action-btn" disabled>Analiz Et</button>

  <script src="popup.js"></script>
</body>
</html>
