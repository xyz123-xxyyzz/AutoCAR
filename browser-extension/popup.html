<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCAR Eklenti</title>
  <style>
    :root {
      --bg-color: #000000;
      --card-bg: #1C1C1E;
      --text-main: #FFFFFF;
      --text-muted: #8E8E93;
      --accent: #0A84FF;
      --border: #38383A;
      --danger: #FF453A;
      --success: #34C759;
    }
    
    body {
      margin: 0;
      padding: 24px;
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      text-align: center;
    }
    
    .logo {
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    
    .status-text {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 24px;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .status-text.active {
      color: var(--accent);
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      margin-bottom: 12px;
    }

    .btn-start {
      background-color: var(--text-main);
      color: var(--bg-color);
    }

    .btn-start:hover {
      background-color: #e0e0e0;
    }

    .btn-stop {
      background-color: var(--card-bg);
      color: var(--danger);
      border: 1px solid var(--border);
    }

    .btn-stop:hover {
      background-color: #2c2c2e;
    }

    .info {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 16px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="logo">AutoCAR</div>
  <div id="status" class="status-text">Duraklatıldı</div>
  
  <button id="btn-start" class="btn btn-start">Çalıştır</button>
  <button id="btn-stop" class="btn btn-stop" style="display: none;">Durdur</button>

  <div class="info">
    "Çalıştır"a bastıktan sonra sahibinden veya arabam.com'da bir ilana girerseniz analiz otomatik başlar.
  </div>

  <script src="popup.js"></script>
</body>
</html>
