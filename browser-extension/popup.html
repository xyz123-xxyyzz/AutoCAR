<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCAR Eklenti</title>
  <style>
    :root {
      --bg-color: #000000;
      --card-bg: #1C1C1E;
      --text-main: #FFFFFF;
      --text-muted: #8E8E93;
      --accent: #0A84FF;
      --border: #38383A;
      --danger: #FF453A;
      --success: #32D74B;
    }
    
    body {
      margin: 0;
      padding: 16px;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
    }

    .logo-box {
      background-color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 900;
    }
    
    .status {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--card-bg);
      padding: 4px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .status.active {
      color: var(--accent);
      border-color: rgba(10, 132, 255, 0.3);
      background: rgba(10, 132, 255, 0.1);
    }
    
    .tab-list {
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 16px;
      display: none;
    }
    
    .tab-list::-webkit-scrollbar { width: 4px; }
    .tab-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    
    .tab-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--card-bg);
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }
    
    .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 12px;
      transition: background 0.2s;
    }
    
    .remove-btn:hover {
      background: var(--border);
      color: var(--danger);
    }
    
    .action-btn {
      width: 100%;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #btn-start {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
    }

    #btn-analyze {
      background-color: var(--accent);
      display: none;
    }

    #btn-report {
      background-color: var(--success);
      display: none;
    }
    
    .action-btn:hover { opacity: 0.9; }
    
    .action-btn:disabled {
      background-color: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* AI Yükleme Ekranı */
    .ai-loading-container {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
    }

    .circular-progress {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0deg, var(--card-bg) 0deg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      transition: background 0.3s;
    }

    .circular-progress::before {
      content: "";
      position: absolute;
      width: 104px;
      height: 104px;
      border-radius: 50%;
      background-color: var(--bg-color);
    }

    .progress-value {
      position: relative;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
    }

    .ai-text {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      font-weight: 500;
    }
    
    .tools {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }

    .window-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <span class="logo-text">Auto</span>
      <span class="logo-box">CAR</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <div class="status" id="status-counter">Sistem Kapalı</div>
      <button id="btn-settings" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:18px;">⚙️</button>
    </div>
  </div>

  <div id="settings-view" style="display: none; margin-bottom: 16px; background: var(--card-bg); padding: 12px; border-radius: 10px; border: 1px solid var(--border);">
    <h3 style="margin-top: 0; font-size: 14px; margin-bottom: 8px;">Ayarlar</h3>
    <label style="font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 4px;">OpenAI API Anahtarı (BYOK)</label>
    <input type="password" id="api-key-input" placeholder="sk-..." style="width: 100%; padding: 8px; box-sizing: border-box; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-color); color: var(--text-main); margin-bottom: 8px;">
    <button id="btn-save-settings" class="action-btn" style="padding: 8px; font-size: 13px;">Kaydet</button>
  </div>

  
  <button id="btn-last-report" class="action-btn" style="background-color: #38383A; margin-bottom: 8px; display: none;">En Sonki Raporu Göster</button>
  <button id="btn-start" class="action-btn">Çalıştır</button>
  
  <div class="tab-list" id="tab-list">
    <!-- Tabs buraya gelecek -->
  </div>

  <div id="analysis-options" style="display: none; background: var(--card-bg); padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 16px;">
    <h3 style="margin-top: 0; font-size: 13px; margin-bottom: 12px; color: var(--text-muted);">Analiz Seçenekleri</h3>
    <label style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; font-size: 14px; cursor: pointer;">
      <span>Veri Analizi (Metinler)</span>
      <input type="checkbox" id="toggle-data" checked style="width: 18px; height: 18px; cursor: pointer;">
    </label>
    <label style="display: flex; align-items: center; justify-content: space-between; font-size: 14px; cursor: pointer;">
      <span>Fotoğraf Analizi (Görseller)</span>
      <input type="checkbox" id="toggle-vision" style="width: 18px; height: 18px; cursor: pointer;">
    </label>
  </div>

  <div class="ai-loading-container" id="ai-loading">
    <div class="circular-progress" id="circular-progress">
      <span class="progress-value" id="progress-value">0%</span>
    </div>
    <div class="ai-text" id="ai-text">Yapay Zeka Hazırlanıyor...</div>
    <button id="btn-cancel-analysis" class="action-btn" style="background-color: #ff3333; margin-top: 15px; width: 100%; display: none;">İptal Et</button>
  </div>
  
  <button id="btn-analyze" class="action-btn">Analiz Et</button>
  <button id="btn-report" class="action-btn">Raporu Göster</button>

  <div class="tools">
    <button id="window-btn" class="window-btn">Kapanmaması İçin Pencere Olarak Aç</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
