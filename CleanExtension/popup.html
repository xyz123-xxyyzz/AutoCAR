<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCAR Master AI</title>
  <style>
    :root {
      --bg-color: #000000;
      --card-bg: #1C1C1E;
      --text-main: #FFFFFF;
      --text-muted: #8E8E93;
      --accent: #0A84FF;
      --border: #38383A;
      --danger: #FF453A;
      --success: #32D74B;
    }
    
    body {
      margin: 0;
      padding: 16px;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
    }

    .logo-box {
      background-color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 900;
    }
    
    .status {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--card-bg);
      padding: 4px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .status.active {
      color: var(--accent);
      border-color: rgba(10, 132, 255, 0.3);
      background: rgba(10, 132, 255, 0.1);
    }
    
    .tab-list {
      max-height: 250px;
      overflow-y: auto;
      margin-bottom: 16px;
      display: none;
    }
    
    .tab-list::-webkit-scrollbar { width: 4px; }
    .tab-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    
    .tab-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--card-bg);
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    
    .tab-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      margin-right: 8px;
    }
    
    .remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 12px;
      transition: background 0.2s;
    }
    
    .remove-btn:hover {
      background: var(--border);
      color: var(--danger);
    }
    
    .action-btn {
      width: 100%;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-bottom: 8px;
    }

    #btn-start-collect { background-color: var(--success); }
    #btn-stop-collect { background-color: var(--danger); display: none; }
    #btn-analyze { background-color: var(--accent); display: none; }
    #btn-report { background-color: var(--success); display: none; }
    
    .action-btn:hover { opacity: 0.9; }
    
    .action-btn:disabled {
      background-color: var(--border);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* AI Yükleme Ekranı */
    .ai-loading-container {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
    }

    .circular-progress {
      position: relative;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0deg, var(--card-bg) 0deg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      transition: background 0.3s;
    }

    .circular-progress::before {
      content: "";
      position: absolute;
      width: 104px;
      height: 104px;
      border-radius: 50%;
      background-color: var(--bg-color);
    }

    .progress-value {
      position: relative;
      font-size: 24px;
      font-weight: 700;
      color: var(--text-main);
    }

    .ai-text {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      font-weight: 500;
    }
    
    .tools {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }
    .icon-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
    }
    .icon-btn:hover { color: var(--text-main); }
  </style>
</head>
<body>

  <div class="header" id="main-header">
    <div class="logo-container">
      <span class="logo-text" style="color:var(--accent);">Auto</span><span class="logo-text" style="color:var(--success);">CAR</span>
    </div>
    <div class="status" id="status-counter">MAKSİMUM 100 İLAN</div>
  </div>

  <div id="main-content">
    <button id="btn-start-collect" class="action-btn">Sistemi Çalıştır</button>
    <button id="btn-stop-collect" class="action-btn">Sistemi Durdur</button>
    
    <div class="tab-list" id="tab-list"></div>
    <div style="text-align: center; color: var(--text-muted); font-size: 13px; font-style: italic; margin-bottom: 16px;" id="empty-state">İlanları farenin orta tuşuyla yan sekmede açın.<br>Otomatik toplanacaktır.</div>
    
    <button id="btn-analyze" class="action-btn">Analiz Et</button>

    <div id="confirm-modal" style="display: none; padding: 12px; background: rgba(0,0,0,0.5); border-radius: 10px; text-align: center; margin-top: 10px; border: 1px solid var(--border);">
      <h3 style="margin-top:0; font-size: 15px; color: var(--accent);">Onay Gerekiyor</h3>
      <p id="confirm-text" style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.4;"></p>
      <div style="display: flex; gap: 8px; justify-content: center;">
         <button id="btn-confirm-yes" class="action-btn" style="background: var(--success); margin:0; padding: 8px; font-size: 13px;">Başlat</button>
         <button id="btn-confirm-no" class="action-btn" style="background: var(--danger); margin:0; padding: 8px; font-size: 13px;">İptal</button>
      </div>
    </div>
  </div>

  <div class="ai-loading-container" id="ai-loading">
    <div class="circular-progress" id="circular-progress">
      <span class="progress-value" id="progress-value">0%</span>
    </div>
    <div class="ai-text" id="ai-text">Araçlar gruplandırılıyor...</div>
    <button id="btn-cancel-ai" class="action-btn" style="background-color: var(--danger); margin-top: 24px; width: 80%;">İptal Et</button>
  </div>

  <div id="report-container" style="display: none;">
    <button id="btn-report" class="action-btn">En Sonki Raporu Göster</button>
  </div>

  <div class="tools">
    <button class="icon-btn" id="window-btn" title="Yeni pencerede aç">🗗</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
